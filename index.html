<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خدمة ابتدائي - كنيسة مارجرجس</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B6B">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* ========================================= */
        /* تعريف الألوان والمتغيرات (Light & Dark)   */
        /* ========================================= */
        :root {
            /* ألوان الوضع الفاتح - مبهجة للأطفال */
            --bg-body: #F0F9FF; /* أزرق فاتح جداً للخلفية */
            --bg-card: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --primary-color: #FF6B6B; /* أحمر مرجاني للعنوان */
            --accent-color: #4ECDC4; /* فيروزي للتفاعل */
            --card-shadow: 0 8px 20px rgba(0,0,0,0.08);
            --card-hover-shadow: 0 12px 28px rgba(0,0,0,0.15);
            
            /* تأثير التدرج للكروت */
            --card-gradient: linear-gradient(135deg, #ffffff 0%, #f7fbfd 100%);
        }

        /* تعريف ألوان الوضع الداكن */
        [data-theme="dark"] {
            --bg-body: #121212; /* أسود عميق للخلفية */
            --bg-card: #1E1E1E; /* رمادي غامق للكروت */
            --text-main: #E0E0E0;
            --text-muted: #A0A0A0;
            --primary-color: #FF8787; /* أحمر أفتح قليلاً */
            --accent-color: #66FCF1; /* فيروزي مضيء */
            --card-shadow: 0 8px 20px rgba(0,0,0,0.3);
            --card-hover-shadow: 0 12px 28px rgba(0,0,0,0.45);
            
            --card-gradient: linear-gradient(135deg, #1e1e1e 0%, #252525 100%);
        }

        /* ========================================= */
        /* التنسيقات العامة               */
        /* ========================================= */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* إزالة لون التظليل عند اللمس في الموبايل */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: 40px; /* مسافة سفلية */
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden; /* منع التمرير الأفقي */
        }

        /* ========================================= */
        /* زر تبديل الوضع الداكن               */
        /* ========================================= */
        .theme-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            background: var(--bg-card);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* ========================================= */
        /* الهيدر (العنوان)               */
        /* ========================================= */
        .header-section {
            margin-bottom: 35px;
            margin-top: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .header-section h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .header-section h3 {
            color: var(--text-muted);
            margin: 0;
            font-weight: 400;
            font-size: 1.1rem;
        }

        .main-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            padding: 5px;
            background: #fff;
            margin-top: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        /* ========================================= */
        /* شبكة الكروت                  */
        /* ========================================= */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
        }

        /* ========================================= */
        /* تنسيق الكارت الواحد              */
        /* ========================================= */
        .card {
            background: var(--card-gradient);
            border-radius: 20px; /* زوايا دائرية ناعمة للأطفال */
            padding: 20px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* أنيميشن مرن */
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent; /* حافة شفافة تظهر عند التفاعل */
        }

        /* تأثير عند تمرير الماوس */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-hover-shadow);
            border-color: var(--accent-color);
        }

        /* إيماءة الضغط (للجوال) */
        .card:active {
            transform: scale(0.92); /* يصغر قليلاً عند الضغط */
            background: var(--accent-color); /* يتغير لونه مؤقتاً */
            color: white;
        }

        .card:active img {
            filter: brightness(0) invert(1); /* يجعل الأيقونة بيضاء عند الضغط */
        }

        /* تنسيق الأيقونات داخل الكروت */
        .card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        /* تنسيق عناوين الكروت */
        .card h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        /* تأثير أنيميشن الدخول للقائمة */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========================================= */
        /* تجاوب الشاشة للموبايل              */
        /* ========================================= */
        @media (max-width: 480px) {
            body { padding: 15px; }
            
            .header-section { margin-bottom: 25px; }
            .header-section h1 { font-size: 1.8rem; }
            .main-logo { width: 80px; height: 80px; }

            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* كارتين في كل صف */
                gap: 12px;
            }

            .card { padding: 15px; border-radius: 18px; }
            .card img { width: 50px; height: 50px; margin-bottom: 8px; }
            .card h3 { font-size: 0.95rem; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="header-section">

            <img src="https://img.icons8.com/fluency/96/praying-hands.png" alt="icon">

        </a>

    </div>

    <script>
        // التحقق من التفضيل المحفوظ مسبقاً لدى المستخدم
        const currentTheme = localStorage.getItem('theme') ? localStorage.getItem('theme') : 'light';
        document.body.setAttribute('data-theme', currentTheme);
        updateBtnIcon(currentTheme);

        function toggleTheme() {
            let theme = document.body.getAttribute('data-theme');
            if (theme === 'dark') {
                theme = 'light';
            } else {
                theme = 'dark';
            }
            
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme); // حفظ التفضيل
            updateBtnIcon(theme);
        }

        function updateBtnIcon(theme) {
            const btn = document.getElementById('themeBtn');
            btn.innerHTML = (theme === 'dark') ? '☀️' : '🌙';
        }
    </script>

</body>
</html>
