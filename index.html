<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خدمة ابتدائي - كنيسة مارجرجس</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B6B">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        :root {
            --bg-body: #F0F9FF;
            --bg-card: #FFFFFF;
            --primary-color: #FF6B6B;
            --accent-color: #4ECDC4;
            --text-main: #2C3E50;
            --header-gradient: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --text-main: #E0E0E0;
            --header-gradient: linear-gradient(135deg, #1e1e1e 0%, #2c3e50 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }

        /* المستطيل العلوي الجديد */
        .top-header-card {
            background: var(--header-gradient);
            margin: 15px;
            padding: 25px 15px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            animation: slideDown 0.6s ease;
        }

        .main-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            background: white;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .top-header-card h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .top-header-card h3 {
            margin: 5px 0 0;
            font-weight: 300;
            opacity: 0.9;
        }

        /* توقيت التحديث */
        .update-badge {
            margin-top: 15px;
            font-size: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* شبكة الكروت */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:active { transform: scale(0.95); }

        .card img { width: 50px; height: 50px; margin-bottom: 10px; }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .theme-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body data-theme="light">

    <div class="top-header-card">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <img src="Screenshot_20260215_205840_WhatsApp.jpg" alt="Logo" class="main-logo">
        <h1>كنيسة مارجرجس باكوس</h1>
        <h3>خدمة ابتدائي</h3>
        <div class="update-badge" id="lastUpdate">جاري التحميل...</div>
    </div>

    <div class="grid-container">
        <a href="files-kg.pdf" class="card" download>
            <img src="https://img.icons8.com/fluency/96/teddy-bear.png" alt="icon">
            <h3>حضانة</h3>
        </a>
        <a href="files-grade1.pdf" class="card" download>
            <img src="https://img.icons8.com/fluency/96/1-circle.png" alt="icon">
            <h3>أولي</h3>
        </a>
        </div>

    <script>
        // عرض تاريخ آخر تحديث
        document.getElementById('lastUpdate').innerText = "آخر تحديث: " + new Date().toLocaleDateString('ar-EG');

        // تبديل الثيم
        function toggleTheme() {
            const body = document.body;
            const theme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        }

        // تسجيل الـ Service Worker للعمل Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker Registered!');
                }).catch(err => {
                    console.log('Service Worker Failed!', err);
                });
            });
        }
    </script>
</body>
</html>
