<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خدمة ابتدائي - كنيسة مارجرجس باكوس</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B6B">

    <style>
        :root {
            --bg-body: #F0F9FF;
            --bg-card: #FFFFFF;
            --primary-color: #FF6B6B;
            --accent-color: #4ECDC4;
            --text-main: #2C3E50;
            --header-gradient: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            --notice-bg: rgba(255, 255, 255, 0.2);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --text-main: #E0E0E0;
            --header-gradient: linear-gradient(135deg, #1e1e1e 0%, #2c3e50 100%);
            --notice-bg: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 30px;
            transition: all 0.3s ease;
            -webkit-user-select: none; /* منع تحديد النص لشعور التطبيق */
        }

        /* المستطيل العلوي */
        .top-header-card {
            background: var(--header-gradient);
            margin: 15px;
            padding: 20px 15px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .main-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.4);
            background: white;
            margin-bottom: 10px;
            object-fit: cover;
        }

        .top-header-card h1 { margin: 0; font-size: 1.5rem; font-weight: 800; }
        .top-header-card h3 { margin: 5px 0 10px; font-weight: 300; font-size: 0.9rem; opacity: 0.9; }

        /* شريط التنبيهات */
        .notice-container {
            background: var(--notice-bg);
            width: 90%;
            padding: 8px 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .notice-text {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            position: relative;
            flex: 1;
        }

        .notice-text span {
            display: inline-block;
            padding-right: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .update-badge {
            margin-top: 10px;
            font-size: 0.65rem;
            opacity: 0.8;
        }

        /* شبكة الأزرار */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 10px 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 18px 10px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .card:active {
            transform: scale(0.92);
            background: var(--accent-color);
            color: white;
        }

        .card img {
            width: 45px;
            height: 45px;
            margin-bottom: 8px;
            transition: filter 0.2s;
        }

        .card:active img { filter: brightness(0) invert(1); }

        .card h3 { margin: 0; font-size: 0.9rem; font-weight: 600; }

        .theme-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* للهواتف الأكبر والتابلت */
        @media (min-width: 600px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

    <script>
        // تبديل الوضع الداكن وحفظ الخيار
        function toggleTheme() {
            const body = document.body;
            const theme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('church-app-theme', theme);
        }

        // استعادة التفضيل عند فتح البرنامج
        if(localStorage.getItem('church-app-theme') === 'dark') toggleTheme();

        // تسجيل الـ Service Worker لتمكين الـ Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Offline mode active!'))
                .catch(err => console.log('Offline setup failed.'));
            });
        }
    </script>
