    <title>خدمة ابتدائي</title>
    
    <link rel="manifest" href="manifest.json">

    <style>
        /* إعدادات الخطوط والألوان العامة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* تنسيق العنوان الرئيسي وصورة البرنامج */
        .header-section {
            margin-bottom: 40px;
        }
        .header-section h1 {
            color: #333;
            font-size: 2.5rem;
        }
        .main-logo {
            width: 150px;
            height: auto;
            border-radius: 15px;
            margin-top: 10px;
        }

        /* تنسيق شبكة المربعات السبعة */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* تنسيق تحسين استجابة الشبكة للموبايلات الصغيرة */
        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr); /* عرض كارتين في الصف الواحد بدلاً من واحد */
                gap: 10px;
                padding: 10px;
            }
            .header-section h1 {
                font-size: 1.8rem;
            }
        }

        /* تنسيق المربع الواحد (الكارت) */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-decoration: none; /* لإزالة الخط من تحت الرابط */
            color: inherit;
            display: block;
            cursor: pointer; /* ليشعر المستخدم أنه قابل للضغط */
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            margin-bottom: 15px;
            border-radius: 50%;
        }

        .card h3 {
            margin: 10px 0 0;
            color: #2c3e50;
        }
    </style>
</head>
